<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0b1226"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- subtle inner glow ring -->
  <rect x="8" y="8" width="496" height="496" rx="104"
        fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <!-- baseline grid line -->
  <line x1="108" y1="418" x2="404" y2="418" stroke="#ffffff" stroke-width="2" opacity="0.18"/>

  <!-- bar 1 (shortest) -->
  <rect x="120" y="312" width="84" height="96" rx="22" fill="url(#bar1)"/>
  <!-- bar 2 (medium) -->
  <rect x="220" y="232" width="84" height="176" rx="22" fill="url(#bar2)"/>
  <!-- bar 3 (tallest) -->
  <rect x="320" y="142" width="84" height="266" rx="22" fill="url(#bar3)"/>

  <!-- achievement dot on top of tallest -->
  <circle cx="362" cy="118" r="20" fill="#fbbf24" opacity="0.28"/>
  <circle cx="362" cy="118" r="12" fill="#fbbf24"/>
  <circle cx="362" cy="118" r="5" fill="#fef3c7"/>
</svg>
